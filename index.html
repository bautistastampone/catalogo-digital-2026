<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catálogo Digital 2026</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .toolbar {
            display: flex;
            gap: 10px;
            padding: 20px;
            background: #f8f9fa;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 200px;
            display: flex;
            gap: 10px;
        }
        
        input[type="text"] {
            flex: 1;
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus {
            outline: none;
            border-color: #667eea;
        }
        
        select {
            padding: 10px 15px;
            border: 2px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            cursor: pointer;
            background: white;
            min-width: 150px;
        }
        
        button {
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: background 0.3s;
        }
        
        button:hover {
            background: #764ba2;
        }
        
        button.secondary {
            background: #6c757d;
        }
        
        button.secondary:hover {
            background: #5a6268;
        }
        
        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 30px;
        }
        
        .product-card {
            background: white;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 15px;
            transition: all 0.3s;
            cursor: pointer;
            position: relative;
        }
        
        .product-card:hover {
            box-shadow: 0 5px 20px rgba(0,0,0,0.1);
            transform: translateY(-2px);
        }
        
        .product-name {
            font-weight: 600;
            font-size: 14px;
            margin-bottom: 8px;
            color: #333;
            min-height: 40px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .product-sku {
            font-size: 12px;
            color: #999;
            margin-bottom: 8px;
        }
        
        .product-category {
            display: inline-block;
            background: #e9ecef;
            padding: 3px 8px;
            border-radius: 3px;
            font-size: 11px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .product-price {
            font-size: 18px;
            font-weight: 700;
            color: #667eea;
            margin-bottom: 10px;
        }
        
        .price-currency {
            font-size: 12px;
            color: #999;
        }
        
        .no-price {
            color: #999;
            font-size: 12px;
            font-style: italic;
        }
        
        .edit-mode .price-input {
            width: 100%;
            padding: 8px;
            border: 2px solid #667eea;
            border-radius: 3px;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 10px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-state h2 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .stats {
            display: flex;
            gap: 20px;
            padding: 20px;
            background: #f8f9fa;
            flex-wrap: wrap;
        }
        
        .stat {
            flex: 1;
            min-width: 150px;
            background: white;
            padding: 15px;
            border-radius: 5px;
            text-align: center;
            border-left: 4px solid #667eea;
        }
        
        .stat-value {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 12px;
            color: #999;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>📦 Catálogo Digital 2026</h1>
            <p>Gestiona tu inventario con facilidad</p>
        </header>
        
        <div class="toolbar">
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="Buscar por nombre, SKU o categoría...">
                <select id="categoryFilter">
                    <option value="">Todas las categorías</option>
                </select>
            </div>
            <button onclick="editarPrecios()">✏️ Editar precios</button>
            <button class="secondary" onclick="guardarCambios()">💾 Guardar cambios</button>
        </div>
        
        <div class="stats">
            <div class="stat">
                <div class="stat-value" id="totalProducts">0</div>
                <div class="stat-label">Productos totales</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalCategories">0</div>
                <div class="stat-label">Categorías</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="productsShowing">0</div>
                <div class="stat-label">Mostrando</div>
            </div>
        </div>
        
        <div class="products-grid" id="productsContainer"></div>
    </div>
    
    <script>
        let allProducts = [];
        let filteredProducts = [];
        let isEditMode = false;
        let editedPrices = {};
        
        // Cargar datos
        async function loadProducts() {
            try {
                const response = await fetch('products.json');
                const data = await response.json();
                
                allProducts = data.products || [];
                filteredProducts = [...allProducts];
                
                // Poblar selector de categorías
                const categories = [...new Set(data.categories.map(c => c.name))];
                const categoryFilter = document.getElementById('categoryFilter');
                categories.forEach(cat => {
                    const option = document.createElement('option');
                    option.value = cat;
                    option.textContent = cat;
                    categoryFilter.appendChild(option);
                });
                
                // Actualizar estadísticas
                document.getElementById('totalProducts').textContent = allProducts.length;
                document.getElementById('totalCategories').textContent = data.categories.length;
                
                renderProducts();
            } catch (error) {
                console.error('Error cargando productos:', error);
                document.getElementById('productsContainer').innerHTML = 
                    '<div class="empty-state"><h2>Error al cargar</h2><p>No se pudieron cargar los productos</p></div>';
            }
        }
        
        // Renderizar productos
        function renderProducts() {
            const container = document.getElementById('productsContainer');
            
            if (filteredProducts.length === 0) {
                container.innerHTML = '<div class="empty-state"><h2>Sin resultados</h2><p>No se encontraron productos</p></div>';
                document.getElementById('productsShowing').textContent = '0';
                return;
            }
            
            container.innerHTML = filteredProducts.map(product => `
                <div class="product-card">
                    <div class="product-sku">SKU: ${product.sku}</div>
                    <div class="product-name">${product.name}</div>
                    <div class="product-category">${product.category}</div>
                    ${isEditMode && product.price !== null ? `
                        <input type="number" class="price-input" data-sku="${product.sku}" 
                               value="${product.price}" step="0.01">
                    ` : `
                        <div class="product-price">
                            ${product.price !== null ? `$${product.price.toFixed(2)} <span class="price-currency">${product.currency}</span>` : '<span class="no-price">Sin precio</span>'}
                        </div>
                    `}
                </div>
            `).join('');
            
            document.getElementById('productsShowing').textContent = filteredProducts.length;
        }
        
        // Filtrar productos
        function filterProducts() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const categoryFilter = document.getElementById('categoryFilter').value;
            
            filteredProducts = allProducts.filter(product => {
                const matchesSearch = !searchTerm || 
                    product.name.toLowerCase().includes(searchTerm) ||
                    product.sku.toLowerCase().includes(searchTerm) ||
                    product.category.toLowerCase().includes(searchTerm);
                    
                const matchesCategory = !categoryFilter || product.category === categoryFilter;
                
                return matchesSearch && matchesCategory;
            });
            
            renderProducts();
        }
        
        // Editar precios
        function editarPrecios() {
            isEditMode = !isEditMode;
            renderProducts();
        }
        
        // Guardar cambios
        function guardarCambios() {
            if (!isEditMode) return;
            
            const inputs = document.querySelectorAll('.price-input');
            const cambios = {};
            
            inputs.forEach(input => {
                const sku = input.dataset.sku;
                const newPrice = parseFloat(input.value);
                cambios[sku] = newPrice;
            });
            
            // Actualizar productos
            allProducts.forEach(product => {
                if (cambios[product.sku]) {
                    product.price = cambios[product.sku];
                }
            });
            
            // Descargar JSON actualizado
            const dataStr = JSON.stringify({
                categories: [...new Set(allProducts.map(p => ({
                    id: p.categoryId,
                    name: p.category
                })))],
                products: allProducts
            }, null, 2);
            
            const blob = new Blob([dataStr], { type: 'application/json' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'products.json';
            a.click();
            
            isEditMode = false;
            alert('Cambios guardados. Descargaste el archivo actualizado.');
            renderProducts();
        }
        
        // Event listeners
        document.getElementById('searchInput').addEventListener('input', filterProducts);
        document.getElementById('categoryFilter').addEventListener('change', filterProducts);
        
        // Cargar al iniciar
        loadProducts();
    </script>
</body>
</html>
